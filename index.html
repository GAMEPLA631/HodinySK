<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderné Digitálne Hodiny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3Cpolyline points='12 6 12 12 16 14'/%3E%3C/svg%3E">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f2937 0%, #0c0a09 100%);
            color: #d1d5db;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
            padding: 2rem;
        }
        .container {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-out;
        }
        .digital-clock {
            font-family: 'Inter', sans-serif;
        }
        .glow {
            text-shadow: 0 0 10px #60a5fa, 0 0 20px #60a5fa, 0 0 30px #60a5fa;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .button {
            transition: all 0.2s ease-in-out;
        }
        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
        }
        .calendar-grid div {
            padding: 8px;
            text-align: center;
            border-radius: 8px;
        }
        .calendar-day.current-day {
            background-color: #60a5fa;
            color: #fff;
            font-weight: bold;
        }
        .calendar-day.selected-day {
            background-color: #4f46e5;
            color: #fff;
            font-weight: bold;
        }
        .calendar-day.other-month {
            color: #4b5563;
        }
        .selector-grid {
            display: grid;
            gap: 0.5rem;
            text-align: center;
        }
        .selector-item {
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }
        .selector-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }
    </style>
</head>

        </div>

            const daysOfWeek = ["Nedeľa", "Pondelok", "Utorok", "Streda", "Štvrtok", "Piatok", "Sobota"];

            function updateClock() {
                const now = new Date();
                let hours = now.getHours();
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                
                let ampm = '';
                if (!is24HourFormat) {
                    ampm = hours >= 12 ? ' PM' : ' AM';
                    hours = hours % 12;
                    hours = hours ? hours : 12;
                }
                
                const timeString = `${String(hours).padStart(2, '0')}:${minutes}:${seconds}${ampm}`;
                clockDisplay.textContent = timeString;

                const dayOfWeek = daysOfWeek[now.getDay()];
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                dateDisplay.textContent = `${dayOfWeek}, ${day}.${month}.${year}`;
            }

            toggleFormatBtn.addEventListener('click', () => {
                is24HourFormat = !is24HourFormat;

            function updateNameDayDisplay(date) {
                const key = `${date.getMonth() + 1}-${date.getDate()}`;
                const name = nameDays[key] || "Nie sú zadané meniny";
                namedayDisplay.textContent = `Meniny má: ${name}`;
            }

            function renderMonthSelector() {
                monthSelector.innerHTML = '';
                monthSelector.classList.remove('hidden');
                yearSelector.classList.add('hidden');
                calendarEl.classList.add('hidden');
                
                months.forEach((month, index) => {
                    const monthEl = document.createElement('div');
                    monthEl.textContent = month;
                    monthEl.classList.add('selector-item', 'text-sm');
                    if (index === currentMonth) {
                        monthEl.classList.add('bg-blue-600');
                    }
                    monthEl.addEventListener('click', () => {
                        currentMonth = index;
                        renderCalendar();
                    });
                    monthSelector.appendChild(monthEl);
                });
            }

            function renderYearSelector() {
                yearSelector.innerHTML = '';
                yearSelector.classList.remove('hidden');
                monthSelector.classList.add('hidden');
                calendarEl.classList.add('hidden');

                const startYear = currentYear - 10;
                const endYear = currentYear + 10;
                
                for (let i = startYear; i <= endYear; i++) {
                    const yearEl = document.createElement('div');
                    yearEl.textContent = i;
                    yearEl.classList.add('selector-item', 'text-sm');
                    if (i === currentYear) {
                        yearEl.classList.add('bg-blue-600');
                    }
                    yearEl.addEventListener('click', () => {
                        currentYear = i;
                        renderCalendar();
                    });
                    yearSelector.appendChild(yearEl);
                }
            }

            function renderCalendar() {
                const date = new Date(currentYear, currentMonth);
                const firstDay = (date.getDay() + 6) % 7;
                const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
                
                calendarEl.innerHTML = '';
                calendarEl.classList.remove('hidden');
                monthSelector.classList.add('hidden');
                yearSelector.classList.add('hidden');
                
                monthDisplay.textContent = months[currentMonth];
                yearDisplay.textContent = currentYear;
                
                for (let i = 0; i < firstDay; i++) {
                    const emptyDay = document.createElement('div');
                    calendarEl.appendChild(emptyDay);
                }
                
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayEl = document.createElement('div');
                    dayEl.textContent = day;
                    dayEl.classList.add('calendar-day', 'cursor-pointer', 'hover:bg-blue-600', 'hover:text-white', 'transition-colors');
                    
                    if (day === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
                        dayEl.classList.add('current-day');
                    }
                    if (day === selectedDate && currentMonth === date.getMonth() && currentYear === date.getFullYear()) {
                         dayEl.classList.add('selected-day');
                    }
                    
                    dayEl.addEventListener('click', () => {
                        selectedDate = day;
                        renderCalendar();
                        updateNameDayDisplay(new Date(currentYear, currentMonth, selectedDate));
                    });

                    calendarEl.appendChild(dayEl);
                }
            }

            prevMonthBtn.addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) {
                    currentMonth = 11;
                    currentYear--;
                }
                renderCalendar();
            });

            nextMonthBtn.addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) {
                    currentMonth = 0;
                    currentYear++;
                }
                renderCalendar();
            });
            
            monthDisplay.addEventListener('click', renderMonthSelector);
            yearDisplay.addEventListener('click', renderYearSelector);
            
            todayBtn.addEventListener('click', () => {
                today = new Date();
                currentMonth = today.getMonth();
                currentYear = today.getFullYear();
                selectedDate = today.getDate();
                renderCalendar();
                updateNameDayDisplay(new Date());
            });

            renderCalendar();
            updateNameDayDisplay(new Date());
        });
    </script>
</body>
</html>
