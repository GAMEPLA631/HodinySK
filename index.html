<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Global - Ultra Modern Timepiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f3ff;
            --accent-soft: rgba(0, 243, 255, 0.2);
            --bg: #030303;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header-font {
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 0.3em;
        }

        /* Dynamické gradientové pozadie */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            transition: background 2s ease;
        }

        /* Ultra moderný sklenený panel */
        .main-stage {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        /* Analógové hodiny */
        .clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            transition: all 0.5s ease;
        }

        .clock-outer {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-radius: 20px;
            transition: transform 0.1s cubic-bezier(0.4, 2.3, 0.3, 1);
        }

        .h-hand { width: 6px; height: 80px; background: white; z-index: 3; }
        .m-hand { width: 4px; height: 110px; background: var(--accent); z-index: 4; }
        .s-hand { width: 1.5px; height: 130px; background: #ff0055; z-index: 5; }

        .center-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 15px var(--accent);
        }

        /* Digitálny čas */
        .digital-time {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(to bottom, #fff 50%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            transition: all 0.5s ease;
        }

        /* Režimy zobrazenia */
        .mode-digital-only .clock-container { display: none; }
        .mode-analog-only .digital-time { display: none; }

        /* Custom Dropdown */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        select {
            appearance: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--accent);
            background: rgba(0, 243, 255, 0.05);
        }

        .tag {
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .tag-dst { background: var(--accent); color: black; }
        .tag-standard { background: #333; color: #999; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            margin-top: 40px;
        }

        .info-box {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .view-mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-mode-btn.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .digital-time { font-size: 4rem; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="p-6">
    <div class="bg-glow" id="glow"></div>

    <header class="flex justify-between items-center mb-6 w-full max-w-7xl mx-auto">
        <div class="header-font text-lg font-bold tracking-widest">CHRONOS<span class="text-cyan-400">.</span>GLOBAL</div>
        
        <div class="flex items-center gap-4">
            <div class="flex gap-2 bg-white/5 p-1 rounded-xl">
                <button onclick="setViewMode('hybrid')" id="btn-hybrid" class="view-mode-btn active">Hybrid</button>
                <button onclick="setViewMode('digital')" id="btn-digital" class="view-mode-btn">Digital</button>
                <button onclick="setViewMode('analog')" id="btn-analog" class="view-mode-btn">Analog</button>
            </div>
            <select id="langSelector" class="!py-2 !px-4 !text-sm !w-auto" onchange="changeLanguage()">
                <option value="sk">SK</option>
                <option value="en">EN</option>
                <option value="de">DE</option>
                <option value="jp">JP</option>
            </select>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center max-w-5xl mx-auto w-full">
        <!-- Search Section -->
        <div class="search-container mb-8">
            <select id="timezoneSelect" onchange="handleTimezoneChange()">
                <!-- JS Population -->
            </select>
            <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none opacity-50 text-xs">▼</div>
        </div>

        <!-- Clock Stage -->
        <div id="mainStage" class="main-stage w-full p-10 md:p-16 flex flex-col items-center relative overflow-hidden">
            <div id="dayNightLabel" class="absolute top-8 left-10 text-[10px] uppercase tracking-[0.4em] opacity-40">--</div>
            
            <div class="flex flex-col lg:flex-row items-center gap-12 lg:gap-20">
                <!-- Analog -->
                <div class="clock-container" id="clockContainer">
                    <div class="clock-outer">
                        <div class="center-dot"></div>
                        <div class="hand h-hand" id="h-hand"></div>
                        <div class="hand m-hand" id="m-hand"></div>
                        <div class="hand s-hand" id="s-hand"></div>
                    </div>
                </div>

                <!-- Digital & Info -->
                <div class="text-center lg:text-left">
                    <div class="flex items-center gap-4 justify-center lg:justify-start mb-2">
                        <h2 id="cityName" class="header-font text-2xl font-bold">LOKÁLNY ČAS</h2>
                        <span id="dstTag" class="tag tag-standard">--</span>
                    </div>
                    <div class="digital-time" id="digitalTime">00:00:00</div>
                    <p id="fullDate" class="text-xl text-gray-500 mt-2 font-light italic">--</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="info-grid">
                <div class="info-box">
                    <p class="text-[10px] uppercase text-gray-500 tracking-widest mb-1" id="label-utc">Posun voči UTC</p>
                    <p class="text-xl font-bold text-cyan-400" id="utc-offset">+0:00</p>
                </div>
                <div class="info-box">
                    <p class="text-[10px] uppercase text-gray-500 tracking-widest mb-1" id="label-update">Sila signálu</p>
                    <p class="text-xl font-bold" id="signal-status">AKTÍVNY</p>
                </div>
                <div class="info-box">
                    <p class="text-[10px] uppercase text-gray-500 tracking-widest mb-1" id="label-next">Zmena času</p>
                    <p class="text-xl font-bold" id="next-change">--</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-8 text-center text-[10px] text-gray-600 uppercase tracking-widest">
        Quantum Engine v5.0 // Multiversal Time Sync // No Latency
    </footer>

    <script>
        const translations = {
            sk: { utc: "Posun voči UTC", update: "Motor času", next: "Ďalšia zmena", signal: "AKTÍVNY", dstActive: "Letný čas", dstInactive: "Zimný čas", day: "Deň", night: "Noc" },
            en: { utc: "UTC Offset", update: "Time Engine", next: "Next Change", signal: "ACTIVE", dstActive: "Daylight Saving", dstInactive: "Standard Time", day: "Day", night: "Night" },
            de: { utc: "UTC Offset", update: "Zeitmotor", next: "Nächste Änderung", signal: "AKTIV", dstActive: "Sommerzeit", dstInactive: "Winterzeit", day: "Tag", night: "Nacht" },
            jp: { utc: "UTCオフセット", update: "タイムエンジン", next: "次の変更", signal: "アクティブ", dstActive: "夏時間", dstInactive: "標準時", day: "昼", night: "夜" }
        };

        let currentLang = 'sk';
        let currentTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let viewMode = 'hybrid'; // hybrid, digital, analog

        const timezones = Intl.supportedValuesOf('timeZone');

        function init() {
            populateTimezones();
            updateUI();
            setInterval(tick, 1000);
            tick();
        }

        function populateTimezones() {
            const select = document.getElementById('timezoneSelect');
            
            // Triedenie podľa kontinentov
            const groups = {};
            timezones.forEach(tz => {
                const continent = tz.split('/')[0];
                if (!groups[continent]) groups[continent] = [];
                groups[continent].push(tz);
            });

            for (const continent in groups) {
                const optGroup = document.createElement('optgroup');
                optGroup.label = continent.toUpperCase();
                
                groups[continent].forEach(tz => {
                    const opt = document.createElement('option');
                    opt.value = tz;
                    const parts = tz.split('/');
                    const city = parts[parts.length - 1].replace(/_/g, ' ');
                    opt.textContent = city;
                    if (tz === currentTimezone) opt.selected = true;
                    optGroup.appendChild(opt);
                });
                select.appendChild(optGroup);
            }
        }

        function setViewMode(mode) {
            viewMode = mode;
            const stage = document.getElementById('mainStage');
            stage.className = `main-stage w-full p-10 md:p-16 flex flex-col items-center relative overflow-hidden mode-${mode}-only`;
            
            // Update buttons
            ['hybrid', 'digital', 'analog'].forEach(m => {
                document.getElementById(`btn-${m}`).classList.toggle('active', m === mode);
            });
        }

        function handleTimezoneChange() {
            currentTimezone = document.getElementById('timezoneSelect').value;
            const parts = currentTimezone.split('/');
            document.getElementById('cityName').textContent = parts[parts.length - 1].replace(/_/g, ' ').toUpperCase();
            updateUI();
        }

        function changeLanguage() {
            currentLang = document.getElementById('langSelector').value;
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.getElementById('label-utc').textContent = t.utc;
            document.getElementById('label-update').textContent = t.update;
            document.getElementById('label-next').textContent = t.next;
            document.getElementById('signal-status').textContent = t.signal;
        }

        function tick() {
            const now = new Date();
            
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: currentTimezone,
                hour: 'numeric', minute: 'numeric', second: 'numeric',
                year: 'numeric', month: 'long', day: 'numeric',
                hour12: false
            });

            const parts = formatter.formatToParts(now);
            const h = parseInt(parts.find(p => p.type === 'hour').value);
            const m = parseInt(parts.find(p => p.type === 'minute').value);
            const s = parseInt(parts.find(p => p.type === 'second').value);
            
            // Digitálny display
            document.getElementById('digitalTime').textContent = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            // Dátum
            const dateStr = now.toLocaleDateString(currentLang === 'sk' ? 'sk-SK' : 'en-US', { 
                timeZone: currentTimezone, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
            document.getElementById('fullDate').textContent = dateStr;

            // Analógové ručičky
            const sDeg = (s / 60) * 360;
            const mDeg = (m / 60) * 360 + (s / 60) * 6;
            const hDeg = (h % 12 / 12) * 360 + (m / 60) * 30;

            document.getElementById('s-hand').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;
            document.getElementById('m-hand').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;

            updateMeta(now);
            
            // Atmosféra
            const isNight = h < 6 || h > 19;
            document.getElementById('glow').style.background = isNight 
                ? 'radial-gradient(circle, rgba(188, 19, 254, 0.15) 0%, transparent 70%)'
                : 'radial-gradient(circle, rgba(0, 243, 255, 0.2) 0%, transparent 70%)';
            document.getElementById('dayNightLabel').textContent = isNight ? translations[currentLang].night : translations[currentLang].day;
        }

        function updateMeta(now) {
            const t = translations[currentLang];
            const tzName = new Intl.DateTimeFormat('en-US', { timeZone: currentTimezone, timeZoneName: 'shortOffset' })
                .formatToParts(now).find(p => p.type === 'timeZoneName').value;
            document.getElementById('utc-offset').textContent = tzName;

            const isDST = checkDST(currentTimezone);
            const tag = document.getElementById('dstTag');
            tag.textContent = isDST ? t.dstActive : t.dstInactive;
            tag.className = `tag ${isDST ? 'tag-dst' : 'tag-standard'}`;

            const nextChange = isDST ? "Október" : "Marec";
            document.getElementById('next-change').textContent = nextChange + " " + now.getFullYear();
        }

        function checkDST(timezone) {
            const now = new Date();
            const getStdOffset = (tz) => {
                const date = new Date();
                const jan = new Date(date.getFullYear(), 0, 1);
                const jul = new Date(date.getFullYear(), 6, 1);
                const std = Math.max(
                    new Date(jan.toLocaleString('en-US', {timeZone: tz})).getTimezoneOffset(),
                    new Date(jul.toLocaleString('en-US', {timeZone: tz})).getTimezoneOffset()
                );
                return std;
            };
            const current = new Date(now.toLocaleString('en-US', {timeZone: timezone})).getTimezoneOffset();
            return current < getStdOffset(timezone);
        }

        window.onload = init;
    </script>
</body>
</html>
